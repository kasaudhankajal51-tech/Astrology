<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600;700&family=Merriweather+Sans:wght@300;400;500;600;700;800&family=Work+Sans:wght@100&display=swap" rel="stylesheet"/>
    <link href="/css/all.min.css" rel="stylesheet">
    <link href="/css/style.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"/>

    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/themes/smoothness/jquery-ui.css"/>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.10.2/themes/smoothness/jquery-ui.css"/>
    <style>
      :root {
        --cosmic-dark: #070913;
        --cosmic-navy: #0b1220;
        --cosmic-accent: #ff6a00;
        --cosmic-glow: rgba(255, 106, 0, 0.4);
        --cosmic-purple: #8a2be2;
        --glass-bg: rgba(20, 15, 30, 0.6);
        --glass-border: rgba(255, 106, 0, 0.15);
      }
      
      body {
        background-color: var(--cosmic-dark) !important;
        color: #fff !important;
        font-family: 'Josefin Sans', sans-serif;
      }
      
      input[type="date"], input[type="time"] {
        color-scheme: dark;
      }
      
      /* Global Sleek Form Controls Override */
      .form-control, .form-select {
        background-color: rgba(0, 0, 0, 0.5) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 12px 15px !important;
        transition: all 0.3s ease !important;
      }
      
      .form-control:focus, .form-select:focus {
        background-color: rgba(0, 0, 0, 0.7) !important;
        border-color: var(--cosmic-accent) !important;
        box-shadow: 0 0 15px rgba(255, 106, 0, 0.3) !important;
      }
      
      .form-control::placeholder {
        color: #888 !important;
        font-style: italic;
      }

      .form-label {
        font-weight: 600;
        letter-spacing: 1px;
        color: #ccc;
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      /* Global Card / Glass Panel */
      .card, .glass-panel {
        background: var(--glass-bg) !important;
        border: 1px solid var(--glass-border) !important;
        backdrop-filter: blur(10px);
        border-radius: 20px !important;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4) !important;
      }

      .card-header {
        background: rgba(0,0,0,0.3) !important;
        border-bottom: 1px solid var(--glass-border) !important;
      }
      
      .card-title, h1, h2, h3, h4, h5, h6 {
        font-family: 'Merriweather Sans', serif !important;
      }

      /* Buttons */
      .btn-primary, .btn-dark, .btn-submit {
        background: linear-gradient(135deg, #ff6a00, #ff0080) !important;
        border: none !important;
        color: white !important;
        border-radius: 30px !important;
        padding: 12px 25px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
        box-shadow: 0 5px 15px rgba(255, 106, 0, 0.3) !important;
        transition: all 0.3s !important;
      }

      .btn-primary:hover, .btn-dark:hover, .btn-submit:hover {
        box-shadow: 0 8px 25px rgba(255, 106, 0, 0.5) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script src="/js/jquery.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/custom.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  </body>
</html>
