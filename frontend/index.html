<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="/css/all.min.css" rel="stylesheet">
    <link href="/css/style.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"/>

    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/themes/smoothness/jquery-ui.css"/>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.10.2/themes/smoothness/jquery-ui.css"/>
    <style>
      :root {
        --primary-color: #8B4A2F;
        --bg-color: #F5EDE4;
        --card-color: #FFF8F2;
        --accent-color: #C8A27A;
        --text-main: #000000;
        --text-muted: #332B24;
        --text-heading: #2A150C;
        --text-card-heading: #1A120D;
        --text-content: #111111;
        --glass-border: #E5D5C8;
        --premium-shadow: 0 12px 30px rgba(90, 46, 27, 0.08);
        
        --font-serif: 'Playfair Display', serif;
        --font-sans: 'Poppins', 'Inter', sans-serif;
      }
      
      body {
        background-color: var(--bg-color) !important;
        color: var(--text-content) !important;
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.6;
        overflow-x: hidden;
      }
      
      h1 {
        font-family: var(--font-serif) !important;
        font-size: clamp(42px, 5vw, 48px) !important;
        font-weight: 700 !important;
        color: var(--text-heading) !important;
        line-height: 1.2;
        margin-bottom: 1.5rem;
      }

      h2, .section-title {
        font-family: var(--font-serif) !important;
        font-size: clamp(32px, 4vw, 38px) !important;
        font-weight: 600 !important;
        color: var(--text-heading) !important;
      }

      h3, .card-title {
        font-family: var(--font-serif) !important;
        font-size: 24px !important;
        font-weight: 600 !important;
        color: var(--text-card-heading) !important;
      }

      .section-subtitle, .sub-heading {
        font-family: var(--font-sans) !important;
        font-size: 18px !important;
        font-weight: 500 !important;
        color: var(--text-muted) !important;
        text-transform: none !important;
        letter-spacing: 0.5px !important;
        font-style: normal !important;
      }

      p {
        font-family: var(--font-sans) !important;
        font-size: 15px !important;
        font-weight: 400 !important;
        color: var(--text-content) !important;
      }
  
      /* Global Card / Glass Panel */
      .card, .glass-panel, .sidebar-widget, .t-card {
        background: var(--card-color) !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 20px !important;
        box-shadow: var(--premium-shadow) !important;
        transition: transform 0.3s ease, box-shadow 0.3s ease !important;
      }
  
      .card-header {
        background: transparent !important;
        border-bottom: 1px solid var(--glass-border) !important;
      }
      
      /* Buttons */
      .btn-primary, .btn-dark, .btn-submit, .mystic-btn-primary, .cta-reg-btn, .t-btn {
        background: var(--primary-color) !important;
        border: none !important;
        color: #FFFFFF !important;
        border-radius: 12px !important;
        padding: 14px 32px !important;
        font-weight: 600 !important;
        font-family: var(--font-sans) !important;
        font-size: 16px !important;
        text-transform: none !important;
        letter-spacing: 0.5px !important;
        box-shadow: 0 4px 12px rgba(139, 74, 47, 0.2) !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
  
      .btn-primary:hover, .btn-dark:hover, .btn-submit:hover, .mystic-btn-primary:hover, .cta-reg-btn:hover, .t-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(139, 74, 47, 0.3) !important;
        background-color: #723c26 !important;
        color: #FFFFFF !important;
      }
  
      .form-control, .form-select, .t-input {
        background-color: #FFFFFF !important;
        border: 1px solid var(--glass-border) !important;
        color: var(--text-main) !important;
        border-radius: 12px !important;
        padding: 12px 16px !important;
        font-family: var(--font-sans) !important;
        font-size: 15px !important;
      }

      .form-control:focus, .t-input:focus {
        border-color: var(--accent-color) !important;
        box-shadow: 0 0 0 4px rgba(200, 162, 122, 0.15) !important;
      }

      .text-gradient {
        background: linear-gradient(135deg, #8B4A2F, #C8A27A);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Global Button Styles */
      .btn-primary, .btn-consult-header, .btn-mobile-cta.primary-cta {
        background-color: var(--primary-color);
        color: #FFFFFF;
        border: none;
        font-weight: 700;
        transition: all 0.3s ease;
      }

      .btn-primary:hover, .btn-consult-header:hover {
        background-color: #000000;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script src="/js/jquery.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/custom.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  </body>
</html>
