<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="/css/all.min.css" rel="stylesheet">
    <link href="/css/style.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"/>

    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/themes/smoothness/jquery-ui.css"/>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.10.2/themes/smoothness/jquery-ui.css"/>
    <style>
      :root {
        --cosmic-accent: #ff6a00;
        --cosmic-accent-orange: #ff8c00;
        --cosmic-accent-pink: #e31b7a;
        --cosmic-gradient: linear-gradient(135deg, #e31b7a, #ff6a00, #ffb347);
        --cosmic-accent-soft: #ffe4f0;
        --cosmic-text: #1a1a1a;
        --cosmic-text-muted: #4a4a4a;
        --glass-border: #e0c8b8;
        --premium-shadow: 0 10px 25px rgba(0,0,0,0.08);
        --cosmic-bg: #fffbf5;
        --cosmic-white: #ffffff;
      }
      
      body {
        background-color: var(--cosmic-bg) !important;
        color: var(--cosmic-text) !important;
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        overflow-x: hidden;
      }
      
      input[type="date"], input[type="time"] {
        color-scheme: light;
      }
      
      /* Global Sleek Form Controls Override */
      .form-control, .form-select, .form-control-custom {
        background-color: var(--cosmic-white) !important;
        border: 1px solid var(--glass-border) !important;
        color: var(--cosmic-text) !important;
        border-radius: 14px !important;
        padding: 12px 18px !important;
        transition: all 0.3s ease !important;
        font-family: 'Inter', sans-serif;
        font-size: 1.05rem !important;
      }
      
      .form-control:focus, .form-select:focus, .form-control-custom:focus {
        background-color: var(--cosmic-white) !important;
        border-color: var(--cosmic-accent-pink) !important;
        box-shadow: 0 0 0 4px var(--cosmic-accent-soft) !important;
        outline: none !important;
      }
      
      .form-control::placeholder {
        color: #94a3b8 !important;
        opacity: 0.7;
      }
  
      .form-label {
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--cosmic-text-muted);
        text-transform: uppercase;
        font-size: 0.85rem;
        margin-bottom: 8px;
        display: block;
      }
  
      /* Global Card / Glass Panel */
      .card, .glass-panel, .sidebar-widget {
        background: var(--cosmic-white) !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 24px !important;
        box-shadow: var(--premium-shadow) !important;
      }
  
      .card-header {
        background: var(--cosmic-white) !important;
        border-bottom: 1px solid var(--glass-border) !important;
      }
      
      .card-title, h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif !important;
        color: var(--cosmic-text);
        font-weight: 700;
      }
  
      /* Buttons */
      .btn-primary, .btn-dark, .btn-submit, .mystic-btn-primary, .cta-reg-btn {
        background: var(--cosmic-gradient) !important;
        border: none !important;
        color: white !important;
        border-radius: 50px !important;
        padding: 14px 36px !important;
        font-weight: 800 !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
        box-shadow: 0 6px 15px rgba(227, 27, 122, 0.25) !important;
        transition: all 0.3s !important;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
      }
  
      .btn-primary:hover, .btn-dark:hover, .btn-submit:hover, .mystic-btn-primary:hover, .cta-reg-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(227, 27, 122, 0.4) !important;
        color: white !important;
      }
  
      .text-gradient {
        background: var(--cosmic-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
  
      .section-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 700;
        color: var(--cosmic-text);
      }
  
      .section-subtitle {
        color: var(--cosmic-accent-pink);
        text-transform: uppercase;
        letter-spacing: 4px;
        font-weight: 800;
        font-size: 1rem;
        display: block;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script src="/js/jquery.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/custom.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  </body>
</html>
